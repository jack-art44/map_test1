<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>물때 리포트</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans+KR:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0A1F2B; --ink:#132B36; --sand:#EDE3D0; --sand-dim:#B9AF9B;
    --teal:#3FDDC4; --coral:#E8794A; --line:rgba(237,227,208,0.14);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--navy); color:var(--sand); font-family:'IBM Plex Sans KR',sans-serif; min-height:100vh; padding-bottom:60px;}
  .wrap{max-width:640px; margin:0 auto; padding:0 20px;}
  header{padding:28px 0 18px; border-bottom:1px solid var(--line);}
  .eyebrow{font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.12em; color:var(--teal); text-transform:uppercase;}
  h1{font-family:'Fraunces',serif; font-weight:600; font-size:30px; margin-top:6px; letter-spacing:-0.01em;}
  .sub{color:var(--sand-dim); font-size:14px; margin-top:6px; line-height:1.5;}

  .locate-btn{margin-top:18px; width:100%; padding:14px; border-radius:10px; background:var(--teal); color:var(--navy); border:none; font-family:inherit; font-weight:600; font-size:15px; cursor:pointer; transition:transform .15s;}
  .locate-btn:active{transform:scale(0.98);}
  .locate-btn:disabled{opacity:0.5;}
  .locate-btn.secondary{background:transparent; border:1px solid var(--line); color:var(--sand); margin-top:10px; width:auto; flex-shrink:0;}
  .manual-row{display:flex; gap:8px; margin-top:10px;}
  .manual-row input{flex:1; min-width:0; padding:14px; border-radius:10px; border:1px solid var(--line); background:var(--ink); color:var(--sand); font-family:inherit; font-size:14px;}
  .manual-row input::placeholder{color:var(--sand-dim);}
  .manual-row input:focus{outline:1px solid var(--teal);}
  .perm-hint{margin-top:10px; font-size:12.5px; color:var(--sand-dim); line-height:1.6; display:none;}
  .perm-hint.show{display:block;}

  .hero{margin-top:26px; padding:26px 22px; border-radius:16px; background:linear-gradient(160deg,var(--ink),#0d222c); border:1px solid var(--line);}
  .hero .place{font-size:13px; color:var(--sand-dim); font-family:'IBM Plex Mono',monospace;}
  .temp-row{display:flex; align-items:baseline; gap:10px; margin-top:10px;}
  .temp{font-family:'Fraunces',serif; font-weight:700; font-size:64px; line-height:1; color:var(--teal);}
  .temp-unit{font-family:'IBM Plex Mono',monospace; font-size:20px; color:var(--sand-dim);}
  .hero-note{margin-top:10px; font-size:13.5px; color:var(--sand-dim); line-height:1.6;}
  .region-tag{display:inline-block; margin-top:12px; font-size:12px; font-family:'IBM Plex Mono',monospace; color:var(--navy); background:var(--sand); padding:4px 10px; border-radius:20px;}

  .ping{width:14px; height:14px; border-radius:50%; background:var(--teal); display:inline-block; position:relative; margin-right:8px;}
  .ping::after{content:''; position:absolute; inset:0; border-radius:50%; border:1.5px solid var(--teal); animation:ping 1.6s ease-out infinite;}
  @keyframes ping{0%{transform:scale(1);opacity:.9;}100%{transform:scale(2.6);opacity:0;}}

  section{margin-top:36px;}
  .sec-head{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:14px;}
  .sec-title{font-family:'Fraunces',serif; font-weight:600; font-size:19px;}
  .sec-count{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--sand-dim);}

  .fish-card{background:var(--ink); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:10px; cursor:pointer; transition:border-color .15s;}
  .fish-card:active{border-color:var(--teal);}
  .fish-head{display:flex; align-items:center; gap:12px;}
  .fish-emoji{font-size:30px;}
  .fish-name{font-weight:600; font-size:15.5px;}
  .fish-season{font-size:12px; color:var(--sand-dim); font-family:'IBM Plex Mono',monospace; margin-top:2px;}
  .fish-arrow{margin-left:auto; color:var(--sand-dim); transition:transform .2s;}
  .fish-card.open .fish-arrow{transform:rotate(90deg);}
  .fish-guide{display:none; margin-top:14px; padding-top:14px; border-top:1px dashed var(--line); font-size:13.5px; line-height:1.7;}
  .fish-card.open .fish-guide{display:block;}
  .guide-row{display:flex; gap:8px; margin-bottom:6px;}
  .guide-label{flex-shrink:0; width:52px; color:var(--teal); font-family:'IBM Plex Mono',monospace; font-size:12px; padding-top:2px;}
  .guide-val{color:var(--sand);}

  #map{width:100%; height:300px; border-radius:14px; margin-bottom:16px; border:1px solid var(--line); filter:saturate(0.9);}
  .point-card{background:var(--ink); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:10px;}
  .point-top{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .point-name{font-weight:600; font-size:15px;}
  .point-type{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--navy); background:var(--coral); padding:3px 8px; border-radius:20px; white-space:nowrap;}
  .point-type.shop{background:var(--teal);}
  .point-note{font-size:13px; margin-top:8px; line-height:1.55; color:var(--sand);}
  .point-dist{font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--sand-dim); margin-top:6px;}

  /* ---- 미니게임 ---- */
  .game-box{background:linear-gradient(180deg,#0e2733 0%, #0a1f2b 100%); border:1px solid var(--line); border-radius:16px; padding:20px; overflow:hidden;}
  .bait-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:12px;}
  .bait-btn{background:var(--ink); border:1px solid var(--line); border-radius:10px; padding:10px 4px; text-align:center; cursor:pointer; transition:all .15s; font-family:inherit; color:var(--sand);}
  .bait-btn .b-emoji{font-size:22px; display:block;}
  .bait-btn .b-name{font-size:11px; margin-top:4px; display:block;}
  .bait-btn.sel{border-color:var(--teal); background:rgba(63,221,196,0.1);}
  .cast-btn{margin-top:14px; width:100%; padding:13px; border-radius:10px; background:var(--coral); color:var(--navy); border:none; font-family:inherit; font-weight:600; font-size:15px; cursor:pointer;}
  .cast-btn:disabled{opacity:0.4;}

  .pond{position:relative; height:220px; margin-top:16px; border-radius:12px; overflow:hidden; background:linear-gradient(180deg,#123240 0%, #0b2531 55%, #081c26 100%);}
  .wave{position:absolute; left:-20%; width:140%; height:14px; border-radius:50%; background:rgba(63,221,196,0.09);}
  .wave.w1{top:26px; animation:waveMove 5s ease-in-out infinite;}
  .wave.w2{top:44px; animation:waveMove 7s ease-in-out infinite reverse;}
  @keyframes waveMove{0%,100%{transform:translateX(0);}50%{transform:translateX(28px);}}

  .rod{position:absolute; top:-4px; left:12%; width:3px; height:64px; background:var(--sand-dim); transform-origin:top left; transform:rotate(38deg); border-radius:2px;}
  .fline{position:absolute; top:52px; left:calc(12% + 38px); width:1px; height:0; background:rgba(237,227,208,0.5); transition:height 0.6s ease-in;}
  .bobber{position:absolute; left:calc(12% + 33px); top:48px; font-size:16px; opacity:0; transition:top .6s ease-in, opacity .3s;}
  .bobber.floating{animation:bob 1.6s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(5px);}}
  .bobber.bite{animation:bite .18s ease-in-out 6;}
  @keyframes bite{0%,100%{transform:translateY(0);}50%{transform:translateY(9px);}}

  .catch-fish{position:absolute; font-size:44px; left:calc(12% + 12px); bottom:-60px; opacity:0;}
  .catch-fish.jump{animation:jump 1.3s cubic-bezier(.3,-0.3,.4,1) forwards;}
  @keyframes jump{
    0%{bottom:-60px; opacity:0; transform:rotate(0) scale(0.7);}
    25%{opacity:1;}
    55%{bottom:130px; transform:rotate(-24deg) scale(1.15);}
    100%{bottom:96px; opacity:1; transform:rotate(-12deg) scale(1);}
  }
  .splash{position:absolute; left:calc(12% + 8px); bottom:30px; font-size:26px; opacity:0;}
  .splash.go{animation:splash .9s ease-out forwards;}
  @keyframes splash{0%{opacity:0; transform:scale(.4);}30%{opacity:1;}100%{opacity:0; transform:scale(1.7) translateY(-14px);}}

  .game-msg{margin-top:14px; text-align:center; min-height:52px; font-size:14px; line-height:1.6;}
  .game-msg .big{font-family:'Fraunces',serif; font-size:19px; font-weight:600; color:var(--teal); display:block; margin-bottom:2px;}
  .game-msg .miss{color:var(--coral);}

  .empty,.status{text-align:center; padding:34px 10px; color:var(--sand-dim); font-size:14px; line-height:1.7;}
  .status .ping{margin:0 auto 14px; display:block;}
  .disclaimer{margin-top:36px; padding-top:16px; border-top:1px solid var(--line); font-size:11.5px; color:var(--sand-dim); line-height:1.7;}
  a{color:var(--teal);}
  ::selection{background:var(--teal); color:var(--navy);}
  @media (prefers-reduced-motion: reduce){ *{animation-duration:.01s !important; transition-duration:.01s !important;} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Live Coastal Report</div>
    <h1>물때 리포트</h1>
    <div class="sub">내 위치의 실시간 수온, 지금 잡히는 어종과 낚시 가이드, 인근 포인트를 확인하세요.</div>
    <button class="locate-btn" id="locateBtn">📍 내 위치로 확인하기</button>
    <div class="manual-row">
      <input type="text" id="manualInput" placeholder="지역명 입력 (예: 해운대, 주문진, 성산읍)" />
      <button class="locate-btn secondary" id="manualBtn" type="button">검색</button>
    </div>
    <div class="perm-hint" id="permHint">
      위치 권한이 거부됐어요. 주소창 왼쪽 사이트 설정에서 위치를 "허용"으로 바꾸고 새로고침하거나, 위 입력창에 지역명을 넣어주세요.
    </div>
  </header>

  <div id="app"></div>

  <div class="disclaimer">
    수온은 Open-Meteo Marine API 실시간 데이터입니다. 어종·포인트·가이드는 권역/계절별 참고 정보로, 실제 조황·규제(금어기, 체장 제한)와 다를 수 있으니 출조 전 현지 낚시점에서 재확인하세요.
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ===== 어종 DB (미끼/방법/팁 가이드 포함) =====

// ===== 미끼(게임용) =====
const BAITS = [
  {id:'worm', name:'갯지렁이', emoji:'🪱'},
  {id:'krill', name:'크릴', emoji:'🦐'},
  {id:'lure', name:'루어', emoji:'🎏'},
  {id:'egi', name:'에기', emoji:'🦑'},
  {id:'squid', name:'오징어살', emoji:'🍢'},
  {id:'crab', name:'게', emoji:'🦀'},
  {id:'fishcut', name:'꽁치살', emoji:'🐟'},
];

// ===== 권역 데이터 (어종 id + 실제 포인트/낚시점) =====

      {name:'오천항 선상낚시', type:'선상', lat:36.4324, lon:126.5081, note:'주꾸미·우럭 배 다수. 가을 주말 예약 치열.'},
      {name:'몽산포 낚시마트', type:'낚시점', lat:36.6672, lon:126.2870, note:'태안권 미끼 보급. 실시간 조황 정보 얻기 좋음.'},

function findRegion(lat, lon){
  for(const r of REGIONS){ if(r.match(lat,lon)) return r; }
  // 못 찾으면 포인트 최근접 권역
  let best=null, bd=1e9;
  for(const r of REGIONS){ for(const p of r.points){
    const d=(p.lat-lat)**2+(p.lon-lon)**2; if(d<bd){bd=d;best=r;}
  }}
  return best;
}
function distKm(a,b,c,d){
  const R=6371, dLa=(c-a)*Math.PI/180, dLo=(d-b)*Math.PI/180;
  const h=Math.sin(dLa/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(h),Math.sqrt(1-h));
}
function seasonLabel(months){
  const names=['','1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  if(months.length>=11) return '연중';
  // 연속 구간 표기 단순화
  return months.map(m=>names[m]).join('·');
}

async function reverseGeocode(lat,lon){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=12&accept-language=ko`);
    const d=await r.json();
    return d.address?(d.address.city||d.address.county||d.address.state||d.display_name.split(',')[0]):`${lat.toFixed(3)}, ${lon.toFixed(3)}`;
  }catch(e){return `${lat.toFixed(3)}, ${lon.toFixed(3)}`;}
}
async function geocodePlace(query){
  const tryOnce=async q=>{
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=5&countrycodes=kr&accept-language=ko&q=${encodeURIComponent(q)}`);
      const d=await r.json();
      if(!d||!d.length) return null;
      const good=d.find(x=>/village|town|hamlet|suburb|city_district|neighbourhood|administrative|islet|island/.test(x.type))||d[0];
      return {lat:parseFloat(good.lat), lon:parseFloat(good.lon)};
    }catch(e){return null;}
  };
  return (await tryOnce(query))||(await tryOnce(`대한민국 ${query}`));
}
async function getSeaTemp(lat,lon){
  try{
    const r=await fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&current=sea_surface_temperature&timezone=auto`);
    const d=await r.json();
    return (d.current&&d.current.sea_surface_temperature!=null)?d.current.sea_surface_temperature:null;
  }catch(e){return null;}
}

function setupGame(fishPool){
  const baitGrid=document.getElementById('baitGrid');
  const castBtn=document.getElementById('castBtn');
  const gameMsg=document.getElementById('gameMsg');
  const fline=document.getElementById('fline');
  const bobber=document.getElementById('bobber');
  const splash=document.getElementById('splash');
  const catchFish=document.getElementById('catchFish');
  let selBait=null, busy=false;

  BAITS.forEach(b=>{
    const btn=document.createElement('button');
    btn.className='bait-btn'; btn.type='button';
    btn.innerHTML=`<span class="b-emoji">${b.emoji}</span><span class="b-name">${b.name}</span>`;
    btn.addEventListener('click',()=>{
      if(busy) return;
      baitGrid.querySelectorAll('.bait-btn').forEach(x=>x.classList.remove('sel'));
      btn.classList.add('sel'); selBait=b.id; castBtn.disabled=false;
      gameMsg.innerHTML=`${b.emoji} ${b.name} 장착 완료. 캐스팅해보세요!`;
    });
    baitGrid.appendChild(btn);
  });

  castBtn.addEventListener('click',()=>{
    if(!selBait||busy) return;
    busy=true; castBtn.disabled=true;
    // 리셋
    catchFish.classList.remove('jump'); splash.classList.remove('go');
    bobber.classList.remove('bite','floating'); bobber.style.opacity='0';
    fline.style.height='0';
    gameMsg.innerHTML='캐스팅... 🌊';

    // 1) 줄 내려가고 찌 뜨기
    setTimeout(()=>{
      fline.style.height='70px';
      bobber.style.top='112px'; bobber.style.opacity='1';
      setTimeout(()=>bobber.classList.add('floating'), 650);
      gameMsg.innerHTML='입질을 기다리는 중...';
    }, 250);

    // 2) 입질 → 결과
    const waitMs = 2200 + Math.random()*2300;
    setTimeout(()=>{
      bobber.classList.remove('floating');
      bobber.classList.add('bite');
      setTimeout(()=>{
        // 미끼 선호 어종 가중 추첨 (25% 꽝)
        const liked=fishPool.filter(f=>f.baitIds&&f.baitIds.includes(selBait));
        const isMiss = Math.random()<(liked.length? 0.22 : 0.55);
        bobber.classList.remove('bite'); bobber.style.opacity='0'; fline.style.height='0';
        if(isMiss){
          splash.classList.add('go');
          gameMsg.innerHTML=`<span class="miss">이런, 놓쳤어요! 💦</span> 미끼를 바꾸거나 다시 던져보세요.`;
        }else{
          const pool = liked.length?liked:fishPool;
          const f = pool[Math.floor(Math.random()*pool.length)];
          catchFish.textContent=f.emoji;
          splash.classList.add('go');
          catchFish.classList.add('jump');
          gameMsg.innerHTML=`<span class="big">${f.emoji} ${f.name} 낚음!</span>${f.method} · 미끼: ${f.bait[0]}<br><span style="color:var(--sand-dim); font-size:12.5px;">${f.tip}</span>`;
        }
        busy=false; castBtn.disabled=false;
      }, 1200);
    }, waitMs);
  });
}

  locateBtn.disabled=true;
  statusView('위치 권한을 확인하는 중... (권한 팝업을 허용해주세요)');
  navigator.geolocation.getCurrentPosition(
    p=>{locateBtn.disabled=false; permHint.classList.remove('show'); run(p.coords.latitude,p.coords.longitude);},
    e=>{locateBtn.disabled=false; permHint.classList.add('show'); emptyView('위치를 가져오지 못했어요. 위 입력창에 지역명을 넣어 검색해주세요.'); manualInput.focus();},
    {enableHighAccuracy:true, timeout:10000}
  );
});
async function doManualSearch(){
  const q=manualInput.value.trim();
  if(!q){manualInput.focus(); return;}
  statusView('입력한 지역을 찾는 중...');
  const c=await geocodePlace(q);
  if(c) run(c.lat,c.lon);
  else emptyView('해당 지역을 찾지 못했어요. 다른 이름(인근 큰 동네)으로 다시 시도해보세요.');
}
manualBtn.addEventListener('click',doManualSearch);
manualInput.addEventListener('keydown',e=>{if(e.key==='Enter')doManualSearch();});

emptyView('위 버튼을 눌러 시작하세요. 위치 정보는 저장되지 않고 이 화면에서만 사용돼요.');

</script>
</body>
</html>
